services:
  app:
    build: .
    container_name: travel-website-app
    restart: unless-stopped
    ports:
      - "${APP_EXTERNAL_PORT:-5000}:${PORT:-5000}"
    environment:
      - PORT=${PORT:-5000}
      - HOST=0.0.0.0
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:-root}
      - DB_NAME=${DB_NAME:-travel_test001}
      - JWT_SECRET=${JWT_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - MAPBOX_ACCESS_TOKEN=${MAPBOX_ACCESS_TOKEN:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL:-}
      - MOMO_PARTNER_CODE=${MOMO_PARTNER_CODE:-}
      - MOMO_ACCESS_KEY=${MOMO_ACCESS_KEY:-}
      - MOMO_SECRET_KEY=${MOMO_SECRET_KEY:-}
      - MOMO_API_URL=${MOMO_API_URL:-}
      - ZALO_APP_ID=${ZALO_APP_ID:-}
      - ZALO_KEY1=${ZALO_KEY1:-}
      - ZALO_KEY2=${ZALO_KEY2:-}
      - ZALO_CALLBACK_URL=${ZALO_CALLBACK_URL:-}
      - ZALO_REDIRECT_URL=${ZALO_REDIRECT_URL:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/public/images/uploads
    networks:
      - travel-network

  db:
    image: mysql:8.0
    container_name: travel-website-db
    restart: unless-stopped
    environment:
      - MYSQL_ALLOW_EMPTY_PASSWORD=${MYSQL_ALLOW_EMPTY_PASSWORD:-yes}
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-}
      - MYSQL_DATABASE=${DB_NAME:-travel_test001}
    ports:
      - "${DB_EXTERNAL_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./src/database/databaseadd.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - travel-network

volumes:
  mysql-data:
  uploads:

networks:
  travel-network:
    driver: bridge
